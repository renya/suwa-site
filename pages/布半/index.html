    <p class="description">
        布半は信州・<a href="/pages/上諏訪温泉/">上諏訪温泉</a>にある温泉旅館。
        大正9年(1920)にボーリングにより温泉を掘り当て、温泉旅館布半別荘の営業を開始。
        諏訪湖畔の温泉街の先駆けとなりました。
        <!-- 源泉500ヶ所、 -->湧出量は毎分15,000リットルと言われています。
    </p>
