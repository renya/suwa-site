    <p class="description">
      高ボッチは岡谷市と塩尻市の境にある。山頂からは諏訪湖を見下ろせ、天気がよければ、富士山、八ヶ岳全景を見る事が出来ます。
      八ヶ岳中信高原国定公園内にあります。
      <a href="/pages/yurucamp/">ゆるキャン△</a>の聖地でもあります。
    </p>
