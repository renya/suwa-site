    <div><span>地図:</span> <a href="https://i.suwa.info/view/suwa6.html?lat=36.039700&lng=138.112612&zoom=16&name=高島城" class="map-link" target="_blank">開く</a></div>

    <p class="description">
      文禄元年(1592)から慶長3年(1598)にかけて日根野高吉が築城。<br>
      慶長6年(1601)に諏訪頼水が2万7000石で入封以来、江戸時代を通じて諏訪氏の居城。<br>
      復興天守は昭和45年(1970)に竣工。内部は資料館となっています。
    </p>
