    <p class="description">
        先宮(さきのみや)神社の御祭神は高光姫命(たかてるひめのみこと)。<br>
        諏訪大社御祭神・建御名方神(たけみなかたのかみ)が出雲から来る以前より、この地に祀られていた神で、伝承では抵抗の末に従ったとされる。<br>
        そのため他の地へ出ることが許されず、境内前の小川には橋を架けないといわれている。
    </p>
