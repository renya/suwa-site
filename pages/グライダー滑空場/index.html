        霧ヶ峰滑空場は昭和8年7月23日に初飛行、7月30日に開場。日本のグライダー発祥の地。
        全長約800m、内東側約300mが、幅約7mで舗装され、その他の部分は整地された非舗装地。
        脇には<a href="/pages/グライダーふれあい館/">グライダーふれあい館</a>があります。
    </p>
