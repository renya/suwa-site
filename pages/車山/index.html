        車山は標高1,925m、<a href="/pages/霧ヶ峰/">霧ヶ峰</a>の最高峰です。
        <a href="/pages/車山肩/">車山肩</a>から登山道を歩いて山頂を目指すことができるほか、反対側からは展望リフトを利用して山頂近くまで行くことができます。
    </p>

<div class="meta">
  <div><span>地図:</span> <a href="https://i.suwa.info/view/suwa6.html?lat=36.103075887164294&lng=138.19668339209386&zoom=16&name=車山" class="map-link" target="_blank">開く</a></div>
</div>

    <div class="gallery">
      <figure>
        <img src="https://i.suwa.info/p/spot/kurumayama-radar.jpg" alt="">
        <figcaption>
            車山気象レーダー観測所は平成11年(1999)に富士山レーダーの後継として気象庁が設置した施設。丸いドームの中に直径4mのパラボラアンテナがあり、電波を発射し、反射波を測定する事で雨や雪の強さ移動などを観測します。この白いドームは、<a href="/pages/高ボッチ/">高ボッチ</a>からも望む事が出来ます。
          <small></small>
        </figcaption>
      </figure>

          <small></small>
