    <p class="description">
        下諏訪町と諏訪市の境にある山。標高は北峰が1365m、南峰が1355m。山頂からは諏訪湖が一望出来ます。
        下諏訪町、諏訪市街<!-- (セイコーエプソン本社近くに登山口の案内板があります) -->それぞれからの登山道がある他、<a href="https://suwa.info/pages/蓼の海/">蓼の海</a>からは徒歩20～30分程でハイキング的に登る事も出来ます。
    </p>
