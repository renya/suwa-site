    <h1>諏訪湖間欠泉センター</h1>

<div class="tags">
  <a class="tag" href="https://shimosuwa.info/pages/温泉/">温泉</a>
</div>

    <p class="description">
        昭和58年(1983)に温泉掘削中に間欠泉が噴出。平成2年(1990)に間欠泉センターが開館。
        噴出当初は約50mの高さまで自噴し、世界第2位の高さと言われましたが、次第に自噴間隔が長くなり、やがて高く自噴する事はなくなりました。
    </p>
