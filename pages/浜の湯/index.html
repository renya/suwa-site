    <p class="description">
        浜の湯は信州・上諏訪温泉にある高級和風旅館。
        昭和20年(1945)11月に創業。昭和59年(1984)<!-- 7月7日 -->に現在の12階建ての建物に改装されました。
        2013年<!-- 3月か -->4月からは株式会社井口が運営しています。
    </p>
