    </p>

    <p>
        <a href="https://shimosuwa.info/pages/三峰山/">三峰山</a>から<a href="http://www.renya.com/pages/utsukushigahara/">美ヶ原</a>までは<a href="/pages/中央分水嶺トレイル/">中央分水嶺トレイル</a>と同じコースになります。<br>
        <a href="https://shimosuwa.info/pages/三峰山/">三峰山</a>から二ツ山までは下諏訪町との境を、その先は鉢伏山を越えて岡谷市との境を歩きます。<br>
        また下諏訪町との境のルートは<a href="https://shimosuwa.info/pages/下諏訪御柱街道トレイル2026/">下諏訪御柱街道トレイル</a>のコースとも被ります。
