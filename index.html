<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>suwa.info</title>
  <meta name="description" content="信州・諏訪圏の情報を順次公開しています。まずは、下諏訪を中心に。">

  <style>
    :root {
      --bg: #0b0b0f;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.82);
      --line: rgba(255, 255, 255, 0.22);
      --panel: rgba(13, 13, 18, 0.28);
      --accent: #8fb7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .hero {
      min-height: 100vh;
      background-image: url("assets/takashimajo-sakura-1.jpg");
      background-size: cover;
      background-position: center;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.15),
          rgba(0, 0, 0, 0.45)
        );
    }

    .hero-content {
      position: relative;
      width: min(720px, 100%);
      padding: 48px 32px;
      text-align: center;

      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;

      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);

      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .site-label {
      margin: 0 0 16px;
      font-size: 13px;
      letter-spacing: 0.18em;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(48px, 8vw, 80px);
      line-height: 1;
      letter-spacing: 0.05em;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
    }

    .lead {
      margin: 28px 0 0;
      font-size: 17px;
      line-height: 1.9;
      color: var(--muted);
      font-weight: 600;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
    }

    /* ===== ボタン（写真を邪魔しない透過） ===== */
    .button {
      position: relative;
      margin-top: 40px;

      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 24px;

      border-radius: 999px;
      color: var(--text);
      text-decoration: none;

      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.28);

      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      transition: all 0.25s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(143, 183, 255, 0.25);
    }

    .button span {
      color: var(--accent);
    }

    @media (max-width: 640px) {
      .hero-content {
        padding: 36px 24px;
        border-radius: 22px;
      }

      .lead {
        font-size: 15px;
      }

      .button {
        margin-top: 32px;
      }
    }
  </style>
</head>

<body>

  <header class="hero">
    <div class="hero-content">
      <p class="site-label">SHINSHU SUWA AREA</p>
      <h1>suwa.info</h1>
      <p class="lead">
        信州・諏訪圏の情報を順次公開しています。<br>
        まずは、下諏訪を中心に。
      </p>
    </div>

    <!-- 👇 ボタンはhero内に配置 -->
    <a class="button" href="https://shimosuwa.info/">
      shimosuwa.info <span>へ</span>
    </a>

  </header>

</body>
</html>
