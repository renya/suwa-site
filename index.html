<!DOCTYPE html>
<html lang="ja">
<head>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0b0b0f;
      color: #ffffff;
    }

    /* ===== ヘッダー（写真部分） ===== */
    .hero {
      height: 60vh;
      background-image: url("assets/takashimajho-sakura-1.jpg"); /* ←ここに画像 */

      display: flex;
      align-items: center;
      justify-content: center;

    /* 暗めオーバーレイ（文字を見やすく） */

      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    .hero-content {
      position: relative;
      text-align: center;
      z-index: 1;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 12px;
      letter-spacing: 0.05em;
    }

    .hero p {
      color: #ddd;
    }

    /* ===== 下のコンテンツ ===== */
    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 60px 20px 80px;
      text-align: center;
    }

    a {
      display: inline-block;
      padding: 12px 18px;
      border: 1px solid #333;
      border-radius: 8px;
      color: #ffffff;
      text-decoration: none;
      background: #14141a;
    }

    a:hover {
      border-color: #7aa2ff;
      background: #1a1a22;
    }

</head>

<body>

  <!-- ===== ヘッダー画像 ===== -->
