<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>suwa.info</title>
  <meta name="description" content="信州・諏訪圏の情報を順次公開しています。まずは、下諏訪を中心に。">

  <style>
    :root {
      --bg: #0b0b0f;
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.82);
      --line: rgba(255, 255, 255, 0.22);
      --panel: rgba(13, 13, 18, 0.38);
      --accent: #8fb7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .hero {
      min-height: 72vh;
      background-image: url("assets/takashimajo-sakura-1.jpg");
      background-size: cover;
      background-position: center;
      position: relative;
      display: grid;
      place-items: center;
      padding: 48px 20px;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.18),
          rgba(0, 0, 0, 0.42)
        );
    }

    .hero-content {
      position: relative;
      width: min(680px, 100%);
      padding: 42px 28px;
      text-align: center;

      /* ここを薄くして写真を見せる */
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);

      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
    }

    .site-label {
      margin: 0 0 14px;
      font-size: 13px;
      letter-spacing: 0.16em;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 8vw, 72px);
      line-height: 1;
      letter-spacing: 0.05em;
      text-shadow: 0 3px 18px rgba(0, 0, 0, 0.55);
    }

    .lead {
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.9;
      font-weight: 600;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 20px 72px;
      text-align: center;
    }

    .button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 22px;
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: all 0.25s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(143, 183, 255, 0.25);
    }

    .button span {
      color: var(--accent);
    }

    @media (max-width: 640px) {
      .hero {
        min-height: 68vh;
      }

      .hero-content {
        padding: 34px 22px;
        border-radius: 20px;
      }

      .lead {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>

  <header class="hero">
    <div class="hero-content">
      <p class="site-label">SHINSHU SUWA AREA</p>
      <h1>suwa.info</h1>
      <p class="lead">
        信州・諏訪圏の情報を順次公開しています。<br>
        まずは、下諏訪を中心に。
      </p>
    </div>
  </header>

  <main class="container">
    <a class="button" href="https://shimosuwa.info/">
      shimosuwa.info <span>へ</span>
    </a>
  </main>

</body>
</html>
